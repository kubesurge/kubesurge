# GoReleaser Configuration for KubeSurge
# Compiles cross-platform binaries and publishes github releases automatically on git tags.
# See: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    # Use zip for Windows archives
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  draft: false
  prerelease: auto


brews:
  - name: kubesurge
    repository:
      owner: kubesurge
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/kubesurge/kubesurge"
    description: "Surgical, zero-touch live diagnostic utility for hardened Kubernetes clusters."
    install: |
      bin.install "kubesurge"

krews:
  - name: kubesurge
    repository:
      owner: kubesurge
      name: krew-index
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kubesurge/kubesurge"
    short_description: "Surgical, zero-touch live diagnostic utility for hardened Kubernetes clusters."
    description: |
      KubeSurge injects lightweight ephemeral containers to run non-destructive debugging,
      trace processes, and stream network/heap captures directly to cloud storage buckets.
    caveats: |
      Requires kubectl cluster admin permissions or patch permissions on pods/ephemeralcontainers.
