apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubesurge
spec:
  version: "{{ .TagName }}"
  homepage: https://github.com/kubesurge/kubesurge
  shortDescription: Pod diagnostic injector and network streamer.
  description: |
    KubeSurge injects safe, harvested ephemeral container payloads into running pods 
    without restarts. It streams tcpdump captures directly to S3, GCS, Azure Blob, 
    or local disk, bypassing local node write overhead and protecting sensitive workloads.
  caveats: |
    Requires Kubernetes 1.25+ and permissions to patch 'pods/ephemeralcontainers'.
    If targeting hardened nodes, run with the --privileged flag to override UID restrictions.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/kubesurge/kubesurge/releases/download/{{ .TagName }}/kubesurge_darwin_x86_64.tar.gz" .TagName }}
    files:
    - from: "./kubesurge"
      to: "."
    - from: "./LICENSE"
      to: "."
    bin: "kubesurge"

  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/kubesurge/kubesurge/releases/download/{{ .TagName }}/kubesurge_darwin_arm64.tar.gz" .TagName }}
    files:
    - from: "./kubesurge"
      to: "."
    - from: "./LICENSE"
      to: "."
    bin: "kubesurge"

  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/kubesurge/kubesurge/releases/download/{{ .TagName }}/kubesurge_linux_x86_64.tar.gz" .TagName }}
    files:
    - from: "./kubesurge"
      to: "."
    - from: "./LICENSE"
      to: "."
    bin: "kubesurge"

  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/kubesurge/kubesurge/releases/download/{{ .TagName }}/kubesurge_linux_arm64.tar.gz" .TagName }}
    files:
    - from: "./kubesurge"
      to: "."
    - from: "./LICENSE"
      to: "."
    bin: "kubesurge"
